# Liquibase configuration for GenVolt / CloudSynk platform
# Copy this file and fill in real credentials — never commit secrets.

changeLogFile=changelog-master.xml

# SQL Server connection
url=jdbc:sqlserver://${MSSQL_HOST}:${MSSQL_PORT};databaseName=${MSSQL_DATABASE};encrypt=true;trustServerCertificate=true
username=${MSSQL_USER}
password=${MSSQL_PASSWORD}
driver=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Liquibase metadata schema (defaults to dbo if omitted)
liquibase.hub.mode=off
